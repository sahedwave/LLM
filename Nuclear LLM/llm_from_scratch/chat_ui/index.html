<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nuclear LLM Chat</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260427c" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Nuclear Engineering Tutor</p>
        <h1>-_-? Chat e Monojog daw. </h1>
        <p class="subcopy">
          Chat casually or ask nuclear engineering questions.
        </p>
      </section>

      <section class="chat-panel">
        <div id="chat-log" class="chat-log" aria-live="polite"></div>

        <form id="chat-form" class="chat-form">
          <label class="sr-only" for="message-input">Ask a question</label>
          <textarea
            id="message-input"
            name="message"
            rows="3"
            placeholder="Say hi, or ask about LOCA, neutron flux, decay heat, reactivity..."
            required
          ></textarea>
          <div class="form-row">
            <div class="voice-controls">
              <button id="voice-toggle-button" type="button" class="secondary voice-button" title="Toggle reply voice">
                Voice On
              </button>
              <button id="voice-stop-button" type="button" class="secondary voice-button" title="Stop current voice reply">
                Stop Voice
              </button>
              <span id="voice-status" class="voice-status" aria-live="polite">Loading voice…</span>
            </div>
            <button id="send-button" type="submit">Send</button>
            <button id="clear-button" type="button" class="secondary">Clear</button>
          </div>
        </form>
      </section>
    </main>

    <template id="message-template">
      <article class="message">
        <header class="message-header">
          <span class="role"></span>
          <span class="meta"></span>
        </header>
        <pre class="message-body"></pre>
      </article>
    </template>

    <script src="/static/app.js?v=20260427c"></script>
    <script src="/static/browser_voice.js?v=20260427c" defer></script>
  </body>
</html>
