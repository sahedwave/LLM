<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nuclear LLM Chat</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Nuclear Engineering Tutor</p>
        <h1>Chat With The Model</h1>
        <p class="subcopy">
          Ask conceptual questions or simulation-worthy reactor questions. The UI will route them through the current
          Stage 5 or Stage 6 path automatically.
        </p>
      </section>

      <section class="chat-panel">
        <div id="chat-log" class="chat-log" aria-live="polite"></div>

        <form id="chat-form" class="chat-form">
          <label class="sr-only" for="message-input">Ask a question</label>
          <textarea
            id="message-input"
            name="message"
            rows="3"
            placeholder="Ask about LOCA, neutron flux, decay heat, reactivity..."
            required
          ></textarea>
          <div class="form-row">
            <button id="send-button" type="submit">Send</button>
            <button id="clear-button" type="button" class="secondary">Clear</button>
          </div>
        </form>
      </section>
    </main>

    <template id="message-template">
      <article class="message">
        <header class="message-header">
          <span class="role"></span>
          <span class="meta"></span>
        </header>
        <pre class="message-body"></pre>
      </article>
    </template>

    <script src="/static/app.js"></script>
  </body>
</html>
